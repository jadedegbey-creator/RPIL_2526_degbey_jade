<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFRI_MentorLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- En-tête avec logo -->
    <header class="site-header">
        <div class="container">
            <div class="d-flex align-items-center py-3">
                <div class="logo-icon me-3">
                    <svg width="42" height="42" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L1 7l11 5 9-4.09V17h2V7L12 2z" fill="white"/>
                        <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z" fill="white"/>
                    </svg>
                </div>
                <div>
                    <h1 class="site-title mb-0">IFRI_MentorLink</h1>
                    <p class="site-subtitle mb-0">Trouvez le mentor qui vous correspond</p>
                </div>
            </div>
        </div>
    </header>

    <div class="container my-5">

        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="search-card p-4 p-md-5 mb-4">
                    <h2 class="h4 mb-4"><i class="bi bi-search me-2"></i>Rechercher un mentor</h2>

                    <form id="formRecherche">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-book me-1"></i> Matières / compétences recherchées
                            </label>
                            <input type="text" id="matieres" class="form-control form-control-lg"
                                   placeholder="Ex: Python, Algorithmique" required>
                            <small class="text-muted">Séparez plusieurs matières par une virgule</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-clock me-1"></i> Heure souhaitée
                            </label>
                            <input type="time" id="heure" class="form-control form-control-lg" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-mortarboard me-1"></i> Filière (optionnel)
                            </label>
                            <input type="text" id="filiere" class="form-control form-control-lg" placeholder="Ex: IA, GL, SI">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="bi bi-search me-2"></i>Rechercher
                        </button>
                    </form>
                </div>

                <div id="resultats"></div>

            </div>
        </div>

    </div>

    <footer class="text-center text-muted py-4">
        <small>IFRI_MentorLink — Projet intégrateur, rattrapage 2025-2026 — Université d'Abomey-Calavi</small>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
